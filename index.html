<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Robot Control Dashboard</title>
    <style>
        body { 
            text-align: center; 
            font-family: Arial, sans-serif; 
            background: #222; 
            color: white; 
            -webkit-user-select: none;
            user-select: none;
        }
        img { 
            width: 640px; 
            height: 480px; 
            background: #000; 
            border: 2px solid #555; 
            max-width: 100%;
            height: auto;
            /* Xoay 180 độ để đúng chiều trên dưới, sau đó scaleX(-1) để lật gương lại chiều trái phải */
            transform: rotate(180deg) scaleX(-1); 
        }
        .btn { 
            padding: 15px 30px; 
            font-size: 20px; 
            margin: 10px; 
            cursor: pointer; 
            border: none;
            border-radius: 5px;
            touch-action: none;          
            -webkit-touch-callout: none; 
        }
        .sound-menu-container {
            border: 1px solid #555;
            padding: 15px;
            margin: 10px auto;
            max-width: 400px;
            border-radius: 8px;
            background: #333;
        }
        select {
            padding: 10px;
            font-size: 16px;
            margin-right: 10px;
            border-radius: 5px;
            background: #444;
            color: white;
            border: 1px solid #666;
            width: 100%;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <h2>Live Camera</h2>
    <!-- Video display frame from ESP-CAM -->
    <img id="cameraStream" src="" alt="Waiting for video stream..."><br>
    
    <h2>Control</h2>
    
    <div>
        <button class="btn" onclick="requestSound()" style="background: #e74c3c; color:white;">Play Connected Sound</button>
    </div>

    <!-- NEW: Sound list playback selection area -->
    <div class="sound-menu-container">
        <button class="btn" onclick="toggleSoundMenu()" style="background: #3498db; color:white; font-size: 16px; padding: 10px 20px;">
            📁 Show / Hide Sound List
        </button>
        
        <div id="soundMenu" style="display: none; margin-top: 15px;">
            <select id="soundSelect">
                <option value="">-- Loading list... --</option>
            </select>
            <br>
            <button class="btn" onclick="playSelectedSound()" style="background: #2ecc71; color:white; font-size: 16px; padding: 10px 20px; margin: 0;">
                ▶ Play Selected Sound
            </button>
        </div>
    </div>
    
    <hr style="border-color: #555; margin: 20px auto; max-width: 400px;">

    <!-- Motor control buttons -->
    <div>
        <button class="btn" data-cmd="F" style="background: #aaa;">Forward (W)</button><br>
        <button class="btn" data-cmd="L" style="background: #aaa;">Left (A)</button>
        <button class="btn" data-cmd="S" style="background: #aaa;">Stop (S)</button>
        <button class="btn" data-cmd="R" style="background: #aaa;">Right (D)</button><br>
        <button class="btn" data-cmd="B" style="background: #aaa;">Backward (X)</button>
    </div>

    <script>
        // --- 1. WEBSOCKET CONNECTION ---
        const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const host = window.location.host;

        const wsVideo = new WebSocket(`${wsProtocol}//${host}/video`);
        wsVideo.binaryType = 'blob';
        const img = document.getElementById('cameraStream');
        
        wsVideo.onmessage = function(event) {
            const url = URL.createObjectURL(event.data);
            img.src = url;
            img.onload = () => URL.revokeObjectURL(url); 
        };

        const wsControl = new WebSocket(`${wsProtocol}//${host}/control`);
        function sendCommand(cmd) {
            if (wsControl.readyState === WebSocket.OPEN) {
                wsControl.send(cmd);
                console.log("Sent command: " + cmd);
            }
        }

        // --- 2. CONTROL EVENT HANDLING (MOBILE + PC) ---
        let currentCmd = 'S'; 
        const buttons = document.querySelectorAll('.btn[data-cmd]');

        buttons.forEach(btn => {
            const cmd = btn.getAttribute('data-cmd');

            btn.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                if (currentCmd !== cmd) {
                    currentCmd = cmd;
                    sendCommand(cmd);
                }
            });

            const releaseAction = (e) => {
                e.preventDefault();
                if (currentCmd === cmd && cmd !== 'S') {
                    currentCmd = 'S';
                    sendCommand('S');
                }
            };

            btn.addEventListener('pointerup', releaseAction);
            btn.addEventListener('pointercancel', releaseAction);
            btn.addEventListener('pointerleave', releaseAction);
        });

        // --- 3. ADD KEYBOARD CONTROL ---
        const keyMap = { 'w': 'F', 'a': 'L', 's': 'S', 'd': 'R', 'x': 'B' };

        document.addEventListener('keydown', (e) => {
            const cmd = keyMap[e.key.toLowerCase()];
            if (cmd && currentCmd !== cmd) {
                currentCmd = cmd;
                sendCommand(cmd);
            }
        });

        document.addEventListener('keyup', (e) => {
            const cmd = keyMap[e.key.toLowerCase()];
            if (cmd && cmd !== 'S' && currentCmd === cmd) {
                currentCmd = 'S';
                sendCommand('S');
            }
        });
    
        // --- 4. AUDIO FEATURES ---
        fetch('/api/sounds')
            .then(response => response.json())
            .then(files => {
                const select = document.getElementById('soundSelect');
                select.innerHTML = ''; 
                
                if (files.length === 0) {
                    select.innerHTML = '<option value="">No files in the defaultsound folder</option>';
                    return;
                }
                
                files.forEach(file => {
                    const option = document.createElement('option');
                    option.value = file;
                    option.textContent = file;
                    select.appendChild(option);
                });
            })
            .catch(err => {
                console.error("Error fetching file list:", err);
                document.getElementById('soundSelect').innerHTML = '<option value="">Connection error / No files found</option>';
            });

        function toggleSoundMenu() {
            const menu = document.getElementById('soundMenu');
            menu.style.display = (menu.style.display === 'none') ? 'block' : 'none';
        }

        function requestSound() {
            if (wsControl.readyState === WebSocket.OPEN) {
                wsControl.send('REQ_SOUND');
            }
        }

        function playSelectedSound() {
            const select = document.getElementById('soundSelect');
            const filename = select.value;
            
            if (!filename) {
                alert("Please select an audio file!");
                return;
            }

            if (wsControl.readyState === WebSocket.OPEN) {
                wsControl.send('REQ_PLAY:' + filename);
            }
        }

        wsControl.onmessage = function(event) {
            if (typeof event.data === 'string') {
                if (event.data === 'PLAY_SOUND') {
                    const audio = new Audio('/connectedsound.wav');
                    audio.play().catch(e => console.log("Error:", e));
                } 
                else if (event.data.startsWith('PLAY_SOUND:')) {
                    const filename = event.data.split(':')[1];
                    const audio = new Audio('/defaultsound/' + filename);
                    audio.play().catch(e => console.log("Error:", e));
                }
            }
        };
    </script>
</body>
</html>
